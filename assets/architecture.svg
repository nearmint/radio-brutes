<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 960" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1040" height="960" fill="#ffffff"/>

  <!-- Title -->
  <text x="520" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">Radio Extra-BRUT(es) — Architecture</text>
  <text x="520" y="66" text-anchor="middle" font-size="13" fill="#6b6b6b">Signal flow from on-site capture to multi-channel distribution</text>

  <!-- =========================================== -->
  <!-- STAGE 1 — ON-SITE STUDIO                    -->
  <!-- =========================================== -->
  <g>
    <rect x="60" y="100" width="920" height="230" rx="10" fill="#fdf9f3" stroke="#d9c9a8" stroke-width="1.5"/>
    <text x="80" y="128" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8a6d2b">ON-SITE STUDIO — Régneville (FR)</text>

    <!-- Turntables -->
    <g>
      <rect x="100" y="160" width="170" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="185" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Turntables</text>
      <text x="185" y="210" text-anchor="middle" font-size="11" fill="#6b6b6b">Vinyl DJ set</text>
    </g>

    <!-- Microphones -->
    <g>
      <rect x="100" y="240" width="170" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="185" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Microphones</text>
      <text x="185" y="290" text-anchor="middle" font-size="11" fill="#6b6b6b">Host + interviews</text>
    </g>

    <!-- Mixing console -->
    <g>
      <rect x="340" y="200" width="190" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="435" y="230" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Mixing console</text>
      <text x="435" y="250" text-anchor="middle" font-size="11" fill="#6b6b6b">Operated by Tom</text>
    </g>

    <!-- USB interface -->
    <g>
      <rect x="585" y="200" width="190" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="680" y="226" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">USB audio interface</text>
      <text x="680" y="246" text-anchor="middle" font-size="11" fill="#6b6b6b">Focusrite Scarlett Solo</text>
      <text x="680" y="260" text-anchor="middle" font-size="11" fill="#6b6b6b">analog → digital</text>
    </g>

    <!-- Laptop -->
    <g>
      <rect x="830" y="200" width="130" height="70" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="895" y="226" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">MacBook</text>
      <text x="895" y="246" text-anchor="middle" font-size="11" fill="#6b6b6b">LadioCast</text>
      <text x="895" y="260" text-anchor="middle" font-size="11" fill="#6b6b6b">broadcast client</text>
    </g>

    <!-- Arrows inside stage 1 -->
    <!-- Turntables -> console -->
    <path d="M 270 195 L 340 225" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <!-- Mics -> console -->
    <path d="M 270 275 L 340 245" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <!-- Console -> USB -->
    <path d="M 530 235 L 585 235" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <!-- USB -> laptop -->
    <path d="M 775 235 L 830 235" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- =========================================== -->
  <!-- 5G UPLINK TRANSITION                        -->
  <!-- =========================================== -->
  <g>
    <path d="M 520 330 L 520 400" stroke="#1a1a1a" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,4"/>
    <rect x="570" y="348" width="110" height="28" rx="14" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="625" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">5G uplink</text>
    <text x="690" y="367" font-size="11" fill="#6b6b6b">128 kbps MP3, ~16 KB/s</text>
  </g>

  <!-- =========================================== -->
  <!-- STAGE 2 — CLOUD                             -->
  <!-- =========================================== -->
  <g>
    <rect x="60" y="410" width="920" height="210" rx="10" fill="#f4f7fb" stroke="#b7c8db" stroke-width="1.5"/>
    <text x="80" y="438" font-size="13" font-weight="700" letter-spacing="1.5" fill="#3c5b80">CLOUD — Scaleway PAR2 · Ubuntu 24.04 LTS · ARM64</text>

    <!-- Nginx -->
    <g>
      <rect x="100" y="470" width="220" height="120" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="210" y="498" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Nginx reverse proxy</text>
      <line x1="120" y1="510" x2="300" y2="510" stroke="#e0e0e0" stroke-width="1"/>
      <text x="210" y="532" text-anchor="middle" font-size="11" fill="#555">TLS termination</text>
      <text x="210" y="550" text-anchor="middle" font-size="11" fill="#555">Let's Encrypt auto-renew</text>
      <text x="210" y="568" text-anchor="middle" font-size="11" fill="#555">UFW firewall</text>
    </g>

    <!-- Arrow Nginx -> Azuracast -->
    <path d="M 320 530 L 395 530" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Azuracast -->
    <g>
      <rect x="400" y="470" width="560" height="120" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="680" y="498" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Docker · AzuraCast</text>
      <line x1="420" y1="510" x2="940" y2="510" stroke="#e0e0e0" stroke-width="1"/>
      <!-- Icecast box -->
      <rect x="430" y="525" width="150" height="50" rx="6" fill="#f4f7fb" stroke="#8aa3bf" stroke-width="1"/>
      <text x="505" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#3c5b80">Icecast</text>
      <text x="505" y="565" text-anchor="middle" font-size="10" fill="#6b6b6b">broadcast server</text>
      <!-- Liquidsoap box -->
      <rect x="600" y="525" width="150" height="50" rx="6" fill="#f4f7fb" stroke="#8aa3bf" stroke-width="1"/>
      <text x="675" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#3c5b80">Liquidsoap</text>
      <text x="675" y="565" text-anchor="middle" font-size="10" fill="#6b6b6b">scheduling + fallback</text>
      <!-- Now Playing API box -->
      <rect x="770" y="525" width="170" height="50" rx="6" fill="#f4f7fb" stroke="#8aa3bf" stroke-width="1"/>
      <text x="855" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#3c5b80">Now Playing API</text>
      <text x="855" y="565" text-anchor="middle" font-size="10" fill="#6b6b6b">JSON · CORS</text>
    </g>
  </g>

  <!-- Fan-out arrows -->
  <g>
    <path d="M 180 620 L 180 685" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M 405 620 L 405 685" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M 635 620 L 635 685" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M 860 620 L 860 685" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>

  <!-- =========================================== -->
  <!-- STAGE 3 — DISTRIBUTION                      -->
  <!-- =========================================== -->
  <g>
    <rect x="60" y="700" width="920" height="210" rx="10" fill="#f7f3f7" stroke="#d4b8cf" stroke-width="1.5"/>
    <text x="80" y="728" font-size="13" font-weight="700" letter-spacing="1.5" fill="#7a3e6b">DISTRIBUTION — Four channels, one source of truth</text>

    <!-- Channel 1 — Public site -->
    <g>
      <rect x="85" y="750" width="190" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="180" y="775" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Public site</text>
      <text x="180" y="795" text-anchor="middle" font-size="11" fill="#7a3e6b" font-weight="600">radio.salonbrutes.com</text>
      <text x="180" y="818" text-anchor="middle" font-size="11" fill="#555">Static HTML + Tailwind</text>
      <text x="180" y="834" text-anchor="middle" font-size="11" fill="#555">GitHub Pages + CNAME</text>
      <text x="180" y="858" text-anchor="middle" font-size="10" font-style="italic" fill="#7a3e6b">this repository</text>
    </g>

    <!-- Channel 2 — Embed -->
    <g>
      <rect x="310" y="750" width="190" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="405" y="775" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Embeddable player</text>
      <text x="405" y="795" text-anchor="middle" font-size="11" fill="#7a3e6b" font-weight="600">/embed.html</text>
      <text x="405" y="818" text-anchor="middle" font-size="11" fill="#555">iframe widget for</text>
      <text x="405" y="834" text-anchor="middle" font-size="11" fill="#555">winemaker partners</text>
    </g>

    <!-- Channel 3 — Raw stream -->
    <g>
      <rect x="535" y="750" width="190" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="630" y="775" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Raw Icecast stream</text>
      <text x="630" y="795" text-anchor="middle" font-size="11" fill="#7a3e6b" font-weight="600">/listen/radio-brutes</text>
      <text x="630" y="818" text-anchor="middle" font-size="11" fill="#555">Direct MP3 URL</text>
      <text x="630" y="834" text-anchor="middle" font-size="11" fill="#555">for partner radios</text>
    </g>

    <!-- Channel 4 — Recordings -->
    <g>
      <rect x="760" y="750" width="190" height="130" rx="8" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="855" y="775" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Post-event archives</text>
      <text x="855" y="795" text-anchor="middle" font-size="11" fill="#7a3e6b" font-weight="600">.mp3 exports</text>
      <text x="855" y="818" text-anchor="middle" font-size="11" fill="#555">Liquidsoap recorder</text>
      <text x="855" y="834" text-anchor="middle" font-size="11" fill="#555">podcast-ready</text>
    </g>
  </g>

  <!-- Footer legend -->
  <text x="520" y="940" text-anchor="middle" font-size="11" fill="#8a8a8a">Frontend repository scope: the public site (leftmost channel). Infrastructure documented for context.</text>

  <!-- Arrow marker def -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
</svg>
