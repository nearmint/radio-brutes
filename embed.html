<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="color-scheme" content="light" />
  <title>Radio Extra-BRUT(es) — Lecteur</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c8b341c4-a47b-4fd4-bac8-dd0da81fac2e"></script>
  <script defer src="/tracking.js"></script>

  <style>
    :root {
      --ink:    #1A1A1A;
      --cream:  #FAF6EC;
      --red:    #9B2C2C;
      --yellow: #F4C430;
      --pink:   #F5C5CE;
    }

    * { box-sizing: border-box; }

    /* html/body : transparent, pas de hauteur forcée. Seul le container
       .embed porte le fond et la bordure. Ouvert en standalone,
       l'iframe se pose en haut du viewport sans remplir. */
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
    }
    body {
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    /* Fallback fiable pour [hidden] sur SVG (certains UAs ignorent) */
    [hidden] { display: none !important; }

    .embed {
      width: 100%;
      max-width: 100%;
      border: 4px solid var(--ink);
      border-radius: 12px;
      overflow: hidden;
      background: var(--yellow);
    }

    /* ---- Player (barre horizontale) ---- */
    .player {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 96px;
      padding: 12px 14px;
      background: var(--yellow);
    }

    .logo {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
      border: 2px solid var(--ink);
      border-radius: 10px;
      background: var(--pink);
      overflow: hidden;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
      display: block;
    }

    .play-btn {
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--ink);
      color: var(--cream);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 150ms ease, transform 150ms ease;
      padding: 0;
    }
    .play-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .play-btn:focus-visible {
      outline: 3px dashed var(--ink);
      outline-offset: 3px;
    }
    .play-btn svg { width: 20px; height: 20px; }

    .play-btn[data-loading="true"] { position: relative; }
    .play-btn[data-loading="true"]::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--ink);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .text-block {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      justify-content: center;
    }
    .title {
      margin: 0;
      font-family: 'Bricolage Grotesque', 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .now-playing {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      color: rgba(26, 26, 26, 0.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Lien inline dans la ligne 2 (ex : "Grand Soir" vers Instagram).
       Hérite de la couleur de .now-playing, souligné par défaut pour être
       repérable sur fond clair, et focus-visible distinct pour a11y clavier. */
    .now-playing a {
      color: inherit;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }
    .now-playing a:hover { text-decoration: none; }
    .now-playing a:focus-visible {
      outline: 2px dashed var(--ink);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* Défilement de la ligne dynamique (.title en Cas A/B, sinon inactif).
       Le span .np-marquee-track est inséré par JS quand contentWidth > clientWidth.
       Sélecteur non scopé : s'applique à toute .np-scrolling (.title, .now-playing…). */
    .np-marquee-track {
      display: inline-block;
      white-space: nowrap;
    }
    .np-scrolling .np-marquee-track {
      padding-left: 100%;
      animation: np-scroll var(--np-scroll-duration, 15s) linear infinite;
    }
    @keyframes np-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    .retry-btn {
      align-self: flex-start;
      margin-top: 2px;
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .retry-btn:hover { background: var(--ink); color: var(--cream); }
    .retry-btn:focus-visible {
      outline: 2px dashed var(--ink);
      outline-offset: 2px;
    }

    /* ---- Mention sous le player ---- */
    .mention {
      display: flex;
      gap: 6px;
      align-items: baseline;
      padding: 9px 14px;
      background: var(--cream);
      border-top: 2px solid var(--ink);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.3;
    }
    .mention-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(26, 26, 26, 0.85);
    }
    .mention-link {
      flex-shrink: 0;
      color: var(--ink);
      font-weight: 500;
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 2px;
      white-space: nowrap;
    }
    .mention-link:hover { text-decoration-thickness: 2px; }
    .mention-link:focus-visible {
      outline: 2px dashed var(--ink);
      outline-offset: 2px;
      border-radius: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .play-btn, .play-btn:hover { transition: none; transform: none; }
      .play-btn[data-loading="true"]::after { animation: none; }
      /* Pas de défilement → fallback ellipsis via .title / .now-playing (overflow:hidden + nowrap) */
      .np-scrolling .np-marquee-track { animation: none; padding-left: 0; }
    }

    /* Responsive < 480 px */
    @media (max-width: 479px) {
      .player { padding: 10px 10px; gap: 10px; min-height: 88px; }
      .logo { display: none; }
      .title { font-size: 15px; }
      .now-playing { font-size: 12px; }
      .mention { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="embed">
    <div class="player" role="region" aria-label="Lecteur Radio Extra-BRUT(es)">
      <div class="logo" aria-hidden="true">
        <img src="/assets/tigre.webp" alt="" width="64" height="64" />
      </div>

      <button
        id="play-btn"
        class="play-btn"
        type="button"
        aria-label="Écouter Radio Extra-BRUT(es)"
        aria-pressed="false"
      >
        <svg id="icon-play" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z" fill="currentColor" />
        </svg>
        <svg id="icon-pause" viewBox="0 0 24 24" aria-hidden="true" hidden>
          <path d="M6 5h4v14H6zm8 0h4v14h-4z" fill="currentColor" />
        </svg>
      </button>

      <div class="text-block">
        <p class="title" id="np-title">Radio Extra-BRUT(es)</p>
        <p class="now-playing" id="now-playing">En direct de Regnéville-sur-Mer</p>
        <button class="retry-btn" id="retry-btn" type="button" hidden>Réessayer</button>
      </div>
    </div>

    <div class="mention">
      <span class="mention-text">La web radio éphémère du salon Extra-BRUT(es).</span>
      <a
        class="mention-link"
        href="https://radio.salonbrutes.com"
        target="_blank"
        rel="noopener noreferrer"
      >En savoir plus →</a>
    </div>
  </div>

  <audio id="audio" data-track="player" preload="none" crossorigin="anonymous"></audio>

  <script>
    // --- Config ---------------------------------------------------------
    const STREAM_URL     = 'https://stream.grandsoir.co/listen/radio-brutes/radio.mp3';
    const NOWPLAYING_URL = 'https://stream.grandsoir.co/api/nowplaying/radio-brutes';
    const POLL_MS        = 60_000;
    // Sheet de programmation (même URL que la page principale, publiée en CSV).
    // On duplique volontairement : l'embed doit rester autonome (pas de
    // dépendance à app.js).
    const SCHEDULE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQA3QZiRSPpUib3F9v00-pItiXuT6yNuV4KaM-S2EPHpIFVZ4ICq2gAKfmYlEVn4SHhu8WzEPXlEiy/pub?output=csv';
    const SCHEDULE_REFRESH_MS = 10 * 60_000; // 10 min

    // --- DOM refs -------------------------------------------------------
    const audio      = document.getElementById('audio');
    const playBtn    = document.getElementById('play-btn');
    const iconPlay   = document.getElementById('icon-play');
    const iconPause  = document.getElementById('icon-pause');
    const npTitle    = document.getElementById('np-title');
    const nowPlaying = document.getElementById('now-playing');
    const retryBtn   = document.getElementById('retry-btn');

    // --- State ---------------------------------------------------------
    let isPlaying       = false;
    let isLoading       = false;
    let everPlayed      = false;
    let pollId          = null;
    let currentSchedule  = []; // sessions parsées depuis le Sheet, refetch 10 min
    let lastMetaScrollText = null; // ligne 1 (dynamique, peut scroller)
    let lastMetaSubtitle   = null; // ligne 2 (statique, "En direct de..." ou "Sélection musicale...")

    // --- UI helpers -----------------------------------------------------
    function setPlayingUI(playing) {
      isPlaying = playing;
      // La propriété .hidden n'existe que sur HTMLElement, pas SVGElement.
      // On passe par setAttribute/removeAttribute pour que le CSS [hidden]
      // s'applique sur les <svg> d'icône.
      if (playing) {
        iconPlay.setAttribute('hidden', '');
        iconPause.removeAttribute('hidden');
      } else {
        iconPause.setAttribute('hidden', '');
        iconPlay.removeAttribute('hidden');
      }
      playBtn.setAttribute('aria-pressed', playing ? 'true' : 'false');
      playBtn.setAttribute(
        'aria-label',
        playing ? 'Mettre en pause' : 'Écouter Radio Extra-BRUT(es)'
      );
    }

    function setLoading(loading) {
      isLoading = loading;
      if (loading) playBtn.dataset.loading = 'true';
      else delete playBtn.dataset.loading;
    }

    function showRetry(show) { retryBtn.hidden = !show; }

    // --- Sheet (programmation) ------------------------------------------
    // Parse CSV minimal (support des champs entre guillemets et guillemets
    // doublés). Dupliqué depuis app.js pour garder l'embed autonome.
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); field = ''; rows.push(row); row = []; }
          else field += c;
        }
      }
      if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
      return rows.filter(r => r.some(cell => cell.trim() !== ''));
    }

    function csvToSessions(rows) {
      if (rows.length < 2) return [];
      const headers = rows[0].map(h => h.trim().toLowerCase());
      const idx = {
        date:  headers.indexOf('date'),
        begin: headers.indexOf('begin'),
        end:   headers.indexOf('end'),
        type:  headers.indexOf('type'),
        guest: headers.indexOf('guest'),
      };
      if (idx.date === -1 || idx.begin === -1) return [];
      return rows.slice(1).map(r => ({
        date:  (r[idx.date]  ?? '').trim(),
        begin: (r[idx.begin] ?? '').trim(),
        end:   idx.end   !== -1 ? (r[idx.end]   ?? '').trim() : '',
        type:  idx.type  !== -1 ? (r[idx.type]  ?? '').trim().toLowerCase() : '',
        guest: idx.guest !== -1 ? (r[idx.guest] ?? '').trim() : '',
      })).filter(s => s.date && s.begin);
    }

    function parseDateYmd(s) {
      let m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
      if (m) return { y: +m[1], mo: +m[2], d: +m[3] };
      m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);
      if (m) return { y: +m[3], mo: +m[2], d: +m[1] };
      return null;
    }
    function parseTime(s) {
      const m = /^(\d{1,2}):(\d{2})$/.exec(s);
      return m ? { h: +m[1], m: +m[2] } : null;
    }

    // Hypothèse : salon en mai 2026 → Europe/Paris = UTC+2 (CEST).
    // Hardcodage acceptable pour un projet éphémère de 2 jours.
    function buildParisDate(dateStr, timeStr) {
      const d = parseDateYmd(dateStr);
      const t = parseTime(timeStr);
      if (!d || !t) return null;
      const pad = (n) => String(n).padStart(2, '0');
      return new Date(`${d.y}-${pad(d.mo)}-${pad(d.d)}T${pad(t.h)}:${pad(t.m)}:00+02:00`);
    }

    function getCurrentProgram(schedule, now) {
      if (!Array.isArray(schedule) || schedule.length === 0) return null;
      const ts = now.getTime();
      for (const s of schedule) {
        const start = buildParisDate(s.date, s.begin);
        if (!start) continue;
        let end = s.end ? buildParisDate(s.date, s.end) : null;
        if (!end) continue;
        if (end.getTime() < start.getTime()) {
          end = new Date(end.getTime() + 24 * 60 * 60 * 1000);
        }
        if (ts >= start.getTime() && ts <= end.getTime()) {
          return { type: s.type, guest: s.guest };
        }
      }
      return null;
    }

    function formatTypeLive(type) {
      const t = (type || '').toLowerCase().trim();
      if (t === 'interview') return 'Interview';
      if (t === 'dj-set')    return 'DJ set';
      if (t === 'concert')   return 'Concert';
      if (t === 'autre')     return 'En direct';
      if (!t)                return 'En direct';
      return t.charAt(0).toUpperCase() + t.slice(1);
    }

    async function loadSchedule() {
      try {
        const res = await fetch(SCHEDULE_CSV_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('http ' + res.status);
        const text = await res.text();
        currentSchedule = csvToSessions(parseCSV(text));
      } catch {
        // silencieux : on garde le schedule précédent (ou []), fallback
        // naturel sur « En direct » pour les cas live hors-créneau.
      }
    }

    // --- Metadata affichage + défilement --------------------------------
    // applyScrollIfNeeded : s'applique à la ligne dynamique (npTitle).
    // Le cache évite de rebuild le DOM quand le texte n'a pas changé (pas
    // de ré-annonce aria-live, pas de relance d'animation).
    function applyScrollIfNeeded(el, text) {
      if (lastMetaScrollText === text) return;
      lastMetaScrollText = text;

      el.classList.remove('np-scrolling');
      el.textContent = text;

      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) return; // fallback ellipsis

      const contentWidth = el.scrollWidth;
      if (contentWidth <= el.clientWidth) return;

      el.textContent = '';
      const span = document.createElement('span');
      span.textContent = text;
      span.className = 'np-marquee-track';
      el.appendChild(span);
      el.classList.add('np-scrolling');

      const totalDistance = el.clientWidth + contentWidth;
      const duration = Math.max(8, totalDistance / 40);
      span.style.setProperty('--np-scroll-duration', `${duration}s`);
    }

    // setSubtitleLine : ligne 2 statique (nowPlaying). Pas de défilement.
    function setSubtitleLine(text) {
      if (lastMetaSubtitle === text) return;
      lastMetaSubtitle = text;
      nowPlaying.textContent = text;
    }

    function updateMeta(data) {
      // Règle commune : ligne 1 (.title) = info dynamique (gras),
      // ligne 2 (.now-playing) = contexte statique (gris).
      // Défilement éventuel appliqué sur la ligne 1.

      // Cas C — erreur API
      if (!data) {
        applyScrollIfNeeded(npTitle, 'Radio Extra-BRUT(es)');
        setSubtitleLine('En direct de Regnéville-sur-Mer');
        return;
      }
      const isLive = data && (
        (data.live && data.live.is_live === true) ||
        (data.now_playing && data.now_playing.live && data.now_playing.live.is_live === true)
      );
      if (isLive) {
        // Cas A — flux live : ligne 1 = `{Type} : {Guest}`
        const program = getCurrentProgram(currentSchedule, new Date());
        if (program) {
          const label = formatTypeLive(program.type);
          applyScrollIfNeeded(npTitle, program.guest ? `${label} : ${program.guest}` : label);
        } else {
          applyScrollIfNeeded(npTitle, 'En direct');
        }
        setSubtitleLine('En direct de Regnéville-sur-Mer');
        return;
      }
      // Cas B — playlist AutoDJ : ligne 1 = `{artist} — {title}`
      const song   = data && data.now_playing && data.now_playing.song;
      const title  = song && song.title  ? song.title.trim()  : '';
      const artist = song && song.artist ? song.artist.trim() : '';
      let line1;
      if (title && artist) line1 = `${artist} — ${title}`;
      else if (title)      line1 = title;
      else if (artist)     line1 = artist;
      else                 line1 = 'Radio Extra-BRUT(es)';
      applyScrollIfNeeded(npTitle, line1);
      // innerHTML exceptionnel : chaîne 100% statique (pas de donnée utilisateur),
      // on injecte un <a> vers l'Instagram de Grand Soir. Les autres cas (live,
      // erreur) restent en textContent via setSubtitleLine().
      const grandSoirHTML = 'Sélection musicale de <a href="https://www.instagram.com/grandsoirdjs/" target="_blank" rel="noopener noreferrer">Grand Soir</a>';
      if (lastMetaSubtitle !== grandSoirHTML) {
        lastMetaSubtitle = grandSoirHTML;
        nowPlaying.innerHTML = grandSoirHTML;
      }
    }

    function resetMeta() {
      updateMeta(null);
    }

    // --- Player logic ---------------------------------------------------
    async function play() {
      try {
        if (!audio.src) audio.src = STREAM_URL;
        setLoading(true);
        showRetry(false);
        await audio.play();
      } catch {
        setLoading(false);
        setPlayingUI(false);
        showRetry(true);
      }
    }

    playBtn.addEventListener('click', () => {
      // On s'appuie sur audio.paused (source de vérité native) plutôt que sur
      // la variable JS, pour éviter toute désync si le navigateur coupe la
      // lecture sans passer par notre code (interruption iOS, perte réseau…).
      if (audio.paused) play(); else audio.pause();
    });

    retryBtn.addEventListener('click', () => {
      audio.src = STREAM_URL + '?t=' + Date.now();
      play();
    });

    // Icône play/pause branchée sur les events natifs de <audio>. 'play' fire
    // dès que la lecture est demandée (immédiat, avant buffering complet) ;
    // 'pause' et 'ended' couvrent toutes les interruptions — y compris celles
    // venant du navigateur (autoplay bloqué résolu, iOS media controls, fin
    // de flux côté serveur). Évite que l'icône reste figée sur "play" pendant
    // que le stream tourne.
    audio.addEventListener('play',  () => setPlayingUI(true));
    audio.addEventListener('pause', () => setPlayingUI(false));
    audio.addEventListener('ended', () => {
      setLoading(false);
      setPlayingUI(false);
    });

    audio.addEventListener('playing', () => {
      // 'playing' = buffer prêt et lecture réellement en cours : on éteint le
      // spinner et on arme aria-live (une seule fois) pour les annonces de
      // now-playing.
      setLoading(false);
      showRetry(false);
      if (!everPlayed) {
        everPlayed = true;
        // aria-live activé seulement après la première écoute pour
        // éviter les annonces parasites au chargement d'iframe.
        nowPlaying.setAttribute('aria-live', 'polite');
      }
    });

    audio.addEventListener('error', () => {
      setLoading(false);
      setPlayingUI(false);
      showRetry(true);
    });
    audio.addEventListener('stalled', () => { if (!audio.paused) setLoading(true); });
    audio.addEventListener('waiting', () => { if (!audio.paused) setLoading(true); });
    audio.addEventListener('canplay', () => { if (!audio.paused) setLoading(false); });

    // --- Now playing polling --------------------------------------------
    async function fetchNowPlaying() {
      try {
        const res = await fetch(NOWPLAYING_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('http ' + res.status);
        const data = await res.json();
        updateMeta(data);
      } catch {
        // silencieux : on conserve la dernière valeur ou le fallback
      }
    }

    function startPolling() {
      if (pollId !== null) return;
      fetchNowPlaying();
      pollId = setInterval(fetchNowPlaying, POLL_MS);
    }
    function stopPolling() {
      if (pollId === null) return;
      clearInterval(pollId);
      pollId = null;
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') stopPolling();
      else startPolling();
    });

    // Sheet : fetch initial + refresh toutes les 10 minutes. Beaucoup moins
    // fréquent que le polling now-playing pour limiter la charge côté Sheet.
    // On refetch en mémoire et on laisse le prochain updateMeta utiliser
    // la nouvelle liste ; pas besoin de re-render immédiat.
    loadSchedule();
    setInterval(loadSchedule, SCHEDULE_REFRESH_MS);

    // --- Init -----------------------------------------------------------
    resetMeta();
    setPlayingUI(false);
    startPolling();
  </script>
</body>
</html>
